{% extends "base.html" %}
{% block title %}Login — Price Tracker{% endblock %}
{% block content %}
<div class="form-card">
  <h1>💸 Price Tracker</h1>
  <p class="hint">Inicia sesión para gestionar tus productos.</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <label>Email
      <input type="email" name="email" required autofocus placeholder="tu@email.com">
    </label>
    <label>Contraseña
      <input type="password" name="password" required>
    </label>
    <button type="submit">Entrar</button>
  </form>
</div>
{% endblock %}
